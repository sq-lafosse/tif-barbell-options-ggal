# --- BENCHMARKS ---
# Dos referencias de desempeño (Decisión metodológica #11 — tutor Natalucci):
#   · ADR GGAL: mide el efecto activo de la estrategia vs el subyacente
#   · Merval en USD: mide el efecto de mercado vs el equity argentino completo
benchmarks:
  adr:
    ticker: "GGAL"            # Yahoo Finance — ADR GGAL en NYSE
    name: "GGAL ADR buy-and-hold"
    currency: "USD"
  merval:
    ticker: "M.BA"            # Yahoo Finance — Merval en ARS (convertir a USD vía CCL)
    name: "Merval en USD"
    currency: "ARS"           # la conversión a USD se hace en fx.py


# --- FECHAS DEL BACKTEST ---
# Rango cubierto por options_full_usd.parquet: sintético (2019-2023) + real (2023-2026).
# Decisión cerrada con el tutor (CLAUDE.md §5.5): el backtest arranca en 2019, no en 2015,
# para incluir PASO 2019 y acotar el horizonte de reconstrucción sintética a ~5 años.
# end_date es la última fecha común a todas las fuentes (opciones reales hasta 2026-06-12;
# ADR/CCL/Merval/T-Bills llegan un poco más lejos pero no aportan opciones más allá de esa fecha).
backtest:
  start_date: "2019-01-01"
  end_date:   "2026-06-12"
  currency: "USD"                  # todos los resultados se reportan en USD


# --- MODELOS DE CAPITALIZACIÓN DEL POLO AGRESIVO (backtest.py) ---
# Tres reglas alternativas para fondear cada ciclo de puts, a comparar antes de
# fijar una para la tesis (ver discusión metodológica con el tutor):
#   · interest_only: presupuesto = interés devengado del T-Bill ese ciclo (principal intacto)
#   · fixed_ratio:    presupuesto = portfolio.aggressive_weight × capital total corriente
#   · hybrid:         presupuesto = max(interés, min_position_pct × capital total)
capital_models:
  initial_capital: 100000.0
  min_position_pct: 0.012   # piso del modelo "hybrid", como % del NAV total por ciclo


# --- REBALANCEO (event-driven, no calendario fijo) ---
# El polo agresivo compra un Put OTM nuevo apenas vence el anterior (ver src/strategy.py).
# La fuente de verdad es `dias_vto` de cada fila, no la etiqueta `opex` del archivo (que
# identifica el ciclo del archivo, no el vencimiento exacto de cada contrato individual).
rebalance:
  min_dias_vto: 15        # piso de días al vencimiento para entrar a un contrato
  max_gap_dias: 5         # máximo de días hacia adelante para buscar dato si falta la fecha exacta
  esquema_priority: ["A", "B", "SIN"]   # preferir datos reales sobre el sintético en el overlap
